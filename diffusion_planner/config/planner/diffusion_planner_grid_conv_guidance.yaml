diffusion_planner:
  _target_: diffusion_planner.planner.planner.DiffusionPlanner
  _convert_: "all"

  config:
    _target_: diffusion_planner.utils.config.Config
    _convert_: "all"

    args_file: ???

    guidance_fn:
      _target_: diffusion_planner.model.guidance.guidance_wrapper.GuidanceWrapper
      _convert_: "all"

  ckpt_path: ???

  past_trajectory_sampling:
    _target_: nuplan.planning.simulation.trajectory.trajectory_sampling.TrajectorySampling
    _convert_: "all"

    num_poses: 21  # 21帧历史
    time_horizon: 2.1

  future_trajectory_sampling:
    _target_: nuplan.planning.simulation.trajectory.trajectory_sampling.TrajectorySampling
    _convert_: "all"

    num_poses: 30  # 30帧未来
    time_horizon: 3.0

  device: cuda

  # Grid cost map specific parameters
  grid_cost_map:
    grid_size: 400  # 400x400 grid
    resolution: 0.25  # 0.25m/pixel
    cost_scale: 10.0  # Cost scaling factor
    boundary_width: 20  # Boundary cost width in pixels
    
  # UNet occupancy predictor parameters
  unet_occupancy:
    input_channels: 64  # Number of input channels
    hidden_dim: 128  # Hidden dimension
    output_frames: 30  # Number of future frames to predict